spring.application.name=kinantobio-guest-guide

# Server configuration
server.port=8080
server.servlet.context-path=/api

# Database configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:kinantobiodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.kinantobio=DEBUG
logging.level.org.springframework.web=DEBUG

# Application specific properties
kinantobio.resort.name=Kinantobio Resort
kinantobio.resort.location=Ispica, Sicily
kinantobio.resort.latitude=36.7181
kinantobio.resort.longitude=15.1936
kinantobio.resort.description=Benvenuti a Kinantobio Resort - La tua destinazione di lusso nel cuore della Sicilia